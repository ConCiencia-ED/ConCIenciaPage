<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ConCiencia · Videos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%239b7bff' d='M12 21s-8-6.58-8-11.5S7.58 2 12 7.09 20 2 20 9.5 12 21 12 21z'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ── EXACTAMENTE el mismo estilo que index.html ── */
:root {
  --primary:    #9b7bff;
  --secondary:  #c8b6ff;
  --background: #f6f3ff;
  --card:       #ffffff;
  --text:       #2d2d2d;
  --accent:     #7a5cff;
  --deep:       #3c2f7a;
  --muted:      #777;
  --border:     #eee;
  --sb-w:       64px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: "Poppins", sans-serif;
  background: linear-gradient(135deg, #f6f3ff, #efeaff);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* ── HEADER — igual que el original ── */
header {
  background: linear-gradient(90deg, #8f6fff, #6a54ff);
  color: white;
  padding: 16px 18px;
  font-weight: 600;
  font-size: 20px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  position: relative;
}
header .header-back {
  position: absolute;
  left: 18px;
  background: rgba(255,255,255,0.18);
  border: none; color: white;
  width: 36px; height: 36px;
  border-radius: 50%; cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: 0.25s;
}
header .header-back:hover { background: rgba(255,255,255,0.32); transform: scale(1.08); }

/* ── BODY LAYOUT ── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── SIDEBAR — icons only, same white card style ── */
.sidebar {
  width: var(--sb-w);
  background: var(--card);
  border-right: 1px solid var(--border);
  box-shadow: 2px 0 12px rgba(155,123,255,0.08);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 18px 0 14px;
  flex-shrink: 0;
  z-index: 10;
}

.sb-ico-btn {
  width: 44px; height: 44px;
  border-radius: 14px; border: none;
  background: none; color: #aaa;
  cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, color 0.2s;
  position: relative;
  margin-bottom: 4px;
}
.sb-ico-btn:hover  { background: #f3efff; color: var(--primary); }
.sb-ico-btn.active { background: #f3efff; color: var(--primary); }
.sb-ico-btn.active::before {
  content: '';
  position: absolute; left: 0; top: 25%; bottom: 25%;
  width: 3px; border-radius: 0 3px 3px 0;
  background: var(--primary);
}

/* Tooltip */
.sb-ico-btn[title]:hover::after {
  content: attr(title);
  position: absolute; left: calc(100% + 10px); top: 50%;
  transform: translateY(-50%);
  background: var(--deep); color: white;
  font-size: 11px; font-weight: 500; font-family: Poppins;
  padding: 4px 11px; border-radius: 8px; white-space: nowrap;
  box-shadow: 0 4px 14px rgba(0,0,0,0.18); pointer-events: none;
  z-index: 100;
}

.sb-divider { width: 28px; height: 1px; background: var(--border); margin: 8px 0; }
.sb-bottom  { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 4px; }

/* ── ADS — igual que el original ── */
.ad {
  width: 160px;
  background: white;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 16px 10px;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  overflow: hidden;
}
.ad img { max-width: 100%; border-radius: 10px; }

/* ── MAIN CONTENT ── */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* Search bar row */
.search-row {
  padding: 16px 24px 0;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
/* Exactly like index.html search */
.search {
  background: white;
  padding: 10px 16px;
  border-radius: 50px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
  max-width: 420px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
  transition: 0.3s;
  border: 1.5px solid transparent;
}
.search:focus-within { transform: scale(1.02); border-color: var(--secondary); }
.search input {
  border: none; outline: none; flex: 1;
  font-size: 14px; font-family: Poppins; color: var(--text);
}
.search input::placeholder { color: #bbb; }
.search i { color: var(--primary); font-size: 15px; }
.search button {
  border: none; background: none; cursor: pointer;
  color: var(--primary); font-size: 14px; padding: 2px 6px;
  border-radius: 8px; transition: 0.2s;
}
.search button:hover { background: #f3efff; }

.section-label {
  font-size: 18px; font-weight: 700; color: var(--deep);
  display: flex; align-items: center; gap: 8px;
}
.section-sub { font-size: 13px; color: var(--muted); font-weight: 400; }

/* Scrollable content */
.content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px 24px 30px;
  -webkit-overflow-scrolling: touch;
  touch-action: pan-y;
}
.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 10px; }

/* ── PANEL ── */
.panel { display: none; }
.panel.active { display: block; animation: fadeUp 0.4s; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── SECTION ROW ── */
.section {
  margin-bottom: 32px;
}
.sec-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--deep);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.sec-title .sec-count {
  font-size: 12px;
  color: var(--muted);
  font-weight: 400;
}

/* ── HORIZONTAL STRIP ── */
.strip {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  overflow-y: visible;
  padding-bottom: 10px;
  -webkit-overflow-scrolling: touch;
  touch-action: pan-x;
  cursor: grab;
  scroll-behavior: smooth;
}
.strip:active { cursor: grabbing; }
.strip::-webkit-scrollbar { height: 4px; }
.strip::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 10px; }
.strip::-webkit-scrollbar-track { background: transparent; }

/* ── VIDEO CARD — same style as index.html .card ── */
.vcard {
  flex-shrink: 0;
  width: 260px;
  background: var(--card);
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  box-shadow: 0 10px 30px rgba(0,0,0,0.10);
  transition: 0.3s;
  border: 1.5px solid transparent;
}
.vcard:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
  border-color: var(--secondary);
}

/* Thumbnail */
.vcard-thumb {
  width: 100%; aspect-ratio: 16/9;
  position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: #f3efff;
}
.vcard-thumb img {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.3s;
}
.vcard:hover .vcard-thumb img { transform: scale(1.06); }

.vcard-thumb-bg  { position: absolute; inset: 0; }
.vcard-thumb-ov  {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(60,47,122,0.55) 0%, transparent 55%);
}

/* Play circle — like a badge over thumb */
.vcard-play {
  position: absolute; z-index: 2;
  width: 46px; height: 46px; border-radius: 50%;
  background: rgba(155,123,255,0.88);
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 16px; padding-left: 3px;
  opacity: 0; transform: scale(0.75);
  transition: opacity 0.22s, transform 0.22s;
  box-shadow: 0 4px 18px rgba(106,84,255,0.4);
}
.vcard:hover .vcard-play { opacity: 1; transform: scale(1); }

.vcard-badge {
  position: absolute; bottom: 9px; left: 10px; z-index: 3;
  background: var(--primary); color: white;
  font-size: 10px; font-weight: 700;
  padding: 2px 10px; border-radius: 50px;
}

/* Body */
.vcard-body { padding: 14px 16px 16px; }
.vcard-title {
  font-size: 14px; font-weight: 600; color: var(--deep);
  margin-bottom: 4px; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.vcard-cred { font-size: 11px; color: var(--muted); margin-bottom: 9px; }
.vcard-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.vcard-tag {
  background: #f3efff; color: var(--primary);
  font-size: 10px; font-weight: 600;
  padding: 2px 9px; border-radius: 50px;
  border: 1px solid #e0d9ff;
}

/* ── SEARCH RESULTS GRID ── */
.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 22px;
}
.results-grid .vcard { width: auto; }

.no-results {
  text-align: center; padding: 50px 20px; color: var(--muted);
}
.no-results i { font-size: 44px; color: var(--secondary); margin-bottom: 14px; display: block; }
.no-results p { font-size: 14px; }

/* ── PLAYER OVERLAY ── */
.player-ov {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(30, 20, 60, 0.72);
  backdrop-filter: blur(16px);
  align-items: center; justify-content: center;
  padding: 24px;
}
.player-ov.open { display: flex; animation: fadeIn 0.25s both; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.player-box {
  background: var(--card);
  border-radius: 24px;
  width: 100%; max-width: 880px;
  padding: 24px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.25);
  display: grid;
  grid-template-columns: 1.75fr 1fr;
  gap: 22px;
  animation: slideUp 0.28s both;
  max-height: 90vh;
  overflow-y: auto;
}
@keyframes slideUp {
  from { transform: translateY(18px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.player-vid video {
  width: 100%; border-radius: 14px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.15);
  background: #000;
}

.p-vol { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
.pvb {
  width: 32px; height: 32px; border-radius: 50%; border: none;
  background: #f3efff; color: var(--primary); cursor: pointer;
  font-size: 12px; display: flex; align-items: center; justify-content: center;
  transition: 0.2s;
}
.pvb:hover { background: var(--primary); color: white; }
.p-vol input { flex: 1; accent-color: var(--primary); cursor: pointer; }

.player-side { display: flex; flex-direction: column; gap: 12px; }
.p-close-row { display: flex; justify-content: flex-end; }
.p-close {
  width: 36px; height: 36px; border-radius: 50%; border: none;
  background: #f3efff; color: var(--muted); cursor: pointer;
  font-size: 15px; display: flex; align-items: center; justify-content: center;
  transition: 0.2s;
}
.p-close:hover { background: #ffe0e0; color: #e74c3c; transform: scale(1.08); }

.p-info { flex: 1; }
.p-title  { font-size: 16px; font-weight: 700; color: var(--deep); margin-bottom: 5px; line-height: 1.4; }
.p-cred   { font-size: 11px; color: var(--muted); margin-bottom: 12px; }
.p-tags   { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
.p-tag    { background: #f3efff; color: var(--primary); font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 50px; border: 1px solid #e0d9ff; }

.p-div    { height: 1px; background: #f0ebff; margin: 10px 0; }
.p-rel-lbl { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 8px; }

.rel-item {
  display: flex; gap: 10px; align-items: center;
  padding: 9px 10px; border-radius: 12px; cursor: pointer;
  background: #faf8ff; border: 1.5px solid #ede9ff;
  margin-bottom: 8px; transition: 0.2s;
}
.rel-item:hover { background: #f3efff; border-color: var(--secondary); }
.rel-thumb {
  width: 54px; height: 36px; border-radius: 8px; flex-shrink: 0;
  overflow: hidden; position: relative;
  display: flex; align-items: center; justify-content: center;
}
.rel-thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.rel-thumb-bg  { position: absolute; inset: 0; }
.rel-thumb i   { position: relative; z-index: 1; color: rgba(255,255,255,0.8); font-size: 11px; }
.rel-title { font-size: 12px; font-weight: 600; color: var(--deep); line-height: 1.3; }
.rel-tag   { font-size: 10px; color: var(--primary); margin-top: 2px; }

/* ── TOAST — igual que index.html ── */
.toast {
  position: fixed; bottom: 20px; right: 20px;
  background: linear-gradient(90deg, #9b7bff, #6a54ff);
  color: white; padding: 14px 20px; border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.18);
  opacity: 0; transform: translateY(20px); transition: 0.5s;
  z-index: 900; font-size: 13px; max-width: 260px;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ── FOOTER — igual que index.html ── */
footer {
  text-align: center; padding: 13px;
  font-size: 13px; color: #777;
  flex-shrink: 0;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 900px) {
  .ad { display: none; }
  .player-box { grid-template-columns: 1fr; }
  .player-side { display: none; }
  .vcard { width: 210px; }
}
</style>
</head>
<body>

<!-- HEADER — igual que el original -->
<header>
  <button class="header-back" onclick="history.back()" title="Volver">
    <i class="fa fa-arrow-left"></i>
  </button>
  ConCiencia · Videos
</header>

<div class="layout">

  <!-- SIDEBAR — solo iconos -->
  <aside class="sidebar">
    <button class="sb-ico-btn active" title="Inicio"   onclick="setPanel('home',this)">
      <i class="fa fa-house"></i>
    </button>
    <button class="sb-ico-btn"        title="Buscar"   onclick="focusSearch(this)">
      <i class="fa fa-magnifying-glass"></i>
    </button>

    <div class="sb-divider"></div>

    <button class="sb-ico-btn" title="Alegría"  onclick="setPanel('alegria',this)">😊</button>
    <button class="sb-ico-btn" title="Tristeza" onclick="setPanel('tristeza',this)">😢</button>
    <button class="sb-ico-btn" title="Ansiedad" onclick="setPanel('ansiedad',this)">😰</button>
    <button class="sb-ico-btn" title="Enojo"    onclick="setPanel('enojo',this)">😤</button>
    <button class="sb-ico-btn" title="Calma"    onclick="setPanel('calma',this)">😌</button>

    <div class="sb-bottom">
      <div class="sb-divider"></div>
      <button class="sb-ico-btn" title="Mi encuesta"    onclick="location.href='encuesta.html'">
        <i class="fa fa-clipboard-list"></i>
      </button>
      <button class="sb-ico-btn" title="Menú principal" onclick="location.href='index.html'">
        <i class="fa fa-home"></i>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main>
    <!-- Search — mismo estilo que index.html -->
    <div class="search-row">
      <div class="search" id="searchBox">
        <i class="fa fa-search"></i>
        <input type="text" id="searchInput" placeholder="Buscar videos, emociones...">
        <button onclick="runSearch()"><i class="fa fa-arrow-right"></i></button>
      </div>
      <div class="section-label">
        <span id="topIcon">🏠</span>
        <span id="topLabel">Inicio</span>
        <span class="section-sub" id="topSub"></span>
      </div>
    </div>

    <!-- Scrollable content -->
    <div class="content" id="content"></div>
  </main>

  <!-- AD — igual que el original -->
  <div class="ad">
    <img src="https://via.placeholder.com/140x500?text=Institucion">
  </div>

</div>

<!-- FOOTER -->
<footer>© 2026 ConCiencia · Plataforma educativa emocional</footer>

<!-- PLAYER -->
<div class="player-ov" id="playerOv">
  <div class="player-box">
    <div class="player-vid">
      <video id="mainVid" controls></video>
      <div class="p-vol">
        <button class="pvb" onclick="changeVol(-0.1)"><i class="fa fa-minus"></i></button>
        <input type="range" id="volR" min="0" max="1" step="0.05" value="0.7" oninput="setVol(this.value)">
        <button class="pvb" onclick="changeVol(0.1)"><i class="fa fa-plus"></i></button>
      </div>
    </div>
    <div class="player-side">
      <div class="p-close-row">
        <button class="p-close" onclick="closePlayer()"><i class="fa fa-xmark"></i></button>
      </div>
      <div class="p-info">
        <div class="p-title" id="pTitle"></div>
        <div class="p-cred"  id="pCred"></div>
        <div class="p-tags"  id="pTags"></div>
        <div class="p-div"></div>
        <div class="p-rel-lbl"><i class="fa fa-film" style="margin-right:4px;color:var(--primary)"></i>Más videos</div>
        <div id="relList"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════════════
   CATÁLOGO — agrega aquí tus videos (máx ~20)
   thumb: "archivo.jpg"  →  usa esa imagen
   thumb: ""             →  degradado automático
══════════════════════════════════════════════════ */
const CATALOG = [
  {
    titulo:   "Felicidad y bienestar",
    file:     "video1.mp4",
    thumb:    "",
    tags:     ["alegria", "motivacion", "bienestar", "calma"],
    creditos: "ConCiencia · Psicología positiva"
  },
  {
    titulo:   "Entendiendo la ansiedad",
    file:     "video2.mp4",
    thumb:    "p1.jpeg",
    tags:     ["ansiedad", "estres", "calma", "bienestar"],
    creditos: "ConCiencia · Control emocional"
  },
  {
    titulo:   "Procesando la tristeza",
    file:     "video3.mp4",
    thumb:    "",
    tags:     ["tristeza", "calma", "bienestar"],
    creditos: "ConCiencia · Procesos emocionales"
  },
  /* ── Agrega más videos aquí: ───────────────────
  {
    titulo:   "Título del video",
    file:     "video4.mp4",
    thumb:    "thumb4.jpg",
    tags:     ["enojo", "autocontrol"],
    creditos: "ConCiencia · Instituto Altum"
  },
  ─────────────────────────────────────────────── */
];

/* Degradados por tag (cuando no hay thumbnail) */
const GRAD = {
  alegria:    ["#f9ca24","#f0932b"],
  tristeza:   ["#a29bfe","#6c5ce7"],
  ansiedad:   ["#c8b6ff","#9b7bff"],
  enojo:      ["#ff7675","#d63031"],
  calma:      ["#55efc4","#00b894"],
  bienestar:  ["#74b9ff","#0984e3"],
  motivacion: ["#ffeaa7","#fdcb6e"],
  estres:     ["#dfe6e9","#b2bec3"],
  default:    ["#c8b6ff","#9b7bff"],
};

const CATS = {
  home:     { icon:"🏠", label:"Inicio",   tag:null       },
  alegria:  { icon:"😊", label:"Alegría",  tag:"alegria"  },
  tristeza: { icon:"😢", label:"Tristeza", tag:"tristeza" },
  ansiedad: { icon:"😰", label:"Ansiedad", tag:"ansiedad" },
  enojo:    { icon:"😤", label:"Enojo",    tag:"enojo"    },
  calma:    { icon:"😌", label:"Calma",    tag:"calma"    },
};

/* ── BOOT ─────────────────────────────────────── */
document.addEventListener("DOMContentLoaded", () => {
  buildPanels();
  checkUrl();
  bindStrips();
  document.getElementById("searchInput").addEventListener("keydown", e => {
    if (e.key === "Enter") runSearch();
  });
});

function checkUrl() {
  const f = new URLSearchParams(window.location.search).get("video");
  if (!f) return;
  const v = CATALOG.find(v => v.file === f);
  if (v) setTimeout(() => openPlayer(v), 260);
}

/* ── BUILD PANELS ────────────────────────────── */
function buildPanels() {
  const ct = document.getElementById("content");
  ct.innerHTML = "";

  Object.keys(CATS).forEach((id, i) => {
    const div = document.createElement("div");
    div.className = "panel" + (i === 0 ? " active" : "");
    div.id = "panel-" + id;
    div.innerHTML = panelHTML(id);
    ct.appendChild(div);
  });

  // Search panel
  const sp = document.createElement("div");
  sp.className = "panel"; sp.id = "panel-search";
  sp.innerHTML = `
    <div class="sec-title">🔍 Resultados de búsqueda</div>
    <div class="results-grid" id="searchGrid"></div>
    <div class="no-results" id="noResults">
      <i class="fa fa-magnifying-glass"></i>
      <p id="noTxt">Escribe algo para buscar</p>
    </div>`;
  ct.appendChild(sp);
}

function panelHTML(id) {
  const cat = CATS[id];
  if (id === "home") {
    const all   = cap(shuffle([...CATALOG]), 8);
    const cal   = byCap("calma", 6);
    const bien  = byCap("bienestar", 6);
    return secHTML("🎬 Todos los videos", all)
         + secHTML("😌 Calma y bienestar", cal.length ? cal : bien);
  }
  const tag  = cat.tag;
  const main = CATALOG.filter(v => v.tags.includes(tag));
  const rest = CATALOG.filter(v => !v.tags.includes(tag));
  return secHTML(cat.icon + " " + cat.label, main.length ? main : cap(shuffle([...CATALOG]),6), !main.length)
       + (rest.length ? secHTML("🎬 Otros videos", cap(rest, 6)) : "");
}

function secHTML(title, videos, soon = false) {
  if (!videos.length) return "";
  const note = soon ? `<span class="section-sub" style="margin-left:8px;">· Próximamente</span>` : "";
  return `
    <div class="section">
      <div class="sec-title">${title}${note}</div>
      <div class="strip" data-strip>
        ${videos.map(v => cardHTML(v)).join("")}
      </div>
    </div>`;
}

/* ── CARD ────────────────────────────────────── */
function cardHTML(v) {
  const t = v.tags[0] || "default";
  const g = GRAD[t] || GRAD.default;
  const thumbInner = v.thumb
    ? `<img src="${v.thumb}" alt="${v.titulo}" loading="lazy">`
    : `<div class="vcard-thumb-bg" style="background:linear-gradient(135deg,${g[0]},${g[1]})"></div>`;
  const tg = v.tags.slice(0,3).map(x => `<span class="vcard-tag">${x}</span>`).join("");

  return `
    <div class="vcard" onclick='openPlayer(byFile("${v.file}"))'>
      <div class="vcard-thumb">
        ${thumbInner}
        <div class="vcard-thumb-ov"></div>
        <div class="vcard-play"><i class="fa fa-play"></i></div>
        <div class="vcard-badge">${t}</div>
      </div>
      <div class="vcard-body">
        <div class="vcard-title">${v.titulo}</div>
        <div class="vcard-cred">${v.creditos}</div>
        <div class="vcard-tags">${tg}</div>
      </div>
    </div>`;
}

function byFile(f) { return CATALOG.find(v => v.file === f) || CATALOG[0]; }
function byCap(tag, n) { return cap(CATALOG.filter(v => v.tags.includes(tag)), n); }
function cap(arr, n)   { return arr.slice(0, n); }
function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

/* ── NAVIGATION ──────────────────────────────── */
function setPanel(id, btn) {
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.getElementById("panel-" + id).classList.add("active");

  document.querySelectorAll(".sb-ico-btn").forEach(b => b.classList.remove("active"));
  if (btn) btn.classList.add("active");

  const cat = CATS[id];
  document.getElementById("topIcon").textContent  = cat.icon;
  document.getElementById("topLabel").textContent = cat.label;
  const n = cat.tag ? CATALOG.filter(v => v.tags.includes(cat.tag)).length : CATALOG.length;
  document.getElementById("topSub").textContent   = `· ${n} video${n !== 1 ? "s" : ""}`;

  document.getElementById("content").scrollTop = 0;
  bindStrips();
}

function focusSearch(btn) {
  document.querySelectorAll(".sb-ico-btn").forEach(b => b.classList.remove("active"));
  if (btn) btn.classList.add("active");
  document.getElementById("topIcon").textContent  = "🔍";
  document.getElementById("topLabel").textContent = "Buscar";
  document.getElementById("topSub").textContent   = "";
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.getElementById("panel-search").classList.add("active");
  document.getElementById("searchGrid").innerHTML = "";
  document.getElementById("noResults").style.display = "block";
  document.getElementById("noTxt").textContent = "Escribe algo para buscar";
  document.getElementById("searchInput").focus();
}

function runSearch() {
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  if (!q) return;

  // If not on search panel, switch to it
  if (!document.getElementById("panel-search").classList.contains("active")) {
    focusSearch(null);
  }

  const res = CATALOG.filter(v =>
    v.titulo.toLowerCase().includes(q) ||
    v.tags.some(t => t.includes(q)) ||
    v.creditos.toLowerCase().includes(q)
  );

  const grid = document.getElementById("searchGrid");
  const no   = document.getElementById("noResults");

  if (res.length) {
    grid.innerHTML = res.map(v => cardHTML(v)).join("");
    no.style.display = "none";
    document.getElementById("topSub").textContent = `· ${res.length} resultado${res.length!==1?"s":""}`;
  } else {
    grid.innerHTML = "";
    no.style.display = "block";
    document.getElementById("noTxt").textContent = `Sin resultados para "${q}"`;
  }
  bindStrips();
}

/* ── DRAG SCROLL ─────────────────────────────── */
function bindStrips() {
  document.querySelectorAll("[data-strip]").forEach(el => {
    if (el._bd) return;
    el._bd = true;
    let drag = false, sx = 0, ss = 0;
    const s  = e => { drag=true; sx=e.touches?e.touches[0].clientX:e.clientX; ss=el.scrollLeft; };
    const m  = e => { if(!drag)return; el.scrollLeft=ss-((e.touches?e.touches[0].clientX:e.clientX)-sx); };
    const en = () => { drag=false; };
    el.addEventListener("mousedown",  s);
    el.addEventListener("mousemove",  m);
    el.addEventListener("mouseup",    en);
    el.addEventListener("mouseleave", en);
    el.addEventListener("touchstart", s,  {passive:true});
    el.addEventListener("touchmove",  m,  {passive:true});
    el.addEventListener("touchend",   en);
  });
}

/* ── PLAYER ──────────────────────────────────── */
function openPlayer(v) {
  if (!v) return;
  const vid = document.getElementById("mainVid");
  vid.src = v.file; vid.volume = 0.7;
  document.getElementById("volR").value  = 0.7;
  document.getElementById("pTitle").textContent = v.titulo;
  document.getElementById("pCred").textContent  = v.creditos;
  document.getElementById("pTags").innerHTML    = v.tags
    .map(t => `<span class="p-tag">${t}</span>`).join("");
  buildRelated(v);
  document.getElementById("playerOv").classList.add("open");
  vid.play().catch(()=>{});
}

function closePlayer() {
  const vid = document.getElementById("mainVid");
  vid.pause(); vid.src = "";
  document.getElementById("playerOv").classList.remove("open");
}

function buildRelated(cur) {
  const pool = CATALOG.filter(v => v.file !== cur.file && v.tags.some(t => cur.tags.includes(t))).slice(0,3);
  const fallback = CATALOG.filter(v => v.file !== cur.file).slice(0,3);
  const final = pool.length ? pool : fallback;

  document.getElementById("relList").innerHTML = final.map(v => {
    const g = GRAD[v.tags[0]] || GRAD.default;
    const t = v.thumb
      ? `<img src="${v.thumb}">`
      : `<div class="rel-thumb-bg" style="background:linear-gradient(135deg,${g[0]},${g[1]})"></div>
         <i class="fa fa-play"></i>`;
    return `
      <div class="rel-item" onclick='openPlayer(byFile("${v.file}"))'>
        <div class="rel-thumb">${t}</div>
        <div>
          <div class="rel-title">${v.titulo}</div>
          <div class="rel-tag">${v.tags[0]}</div>
        </div>
      </div>`;
  }).join("");
}

function changeVol(d) {
  const v = document.getElementById("mainVid");
  v.volume = Math.max(0, Math.min(1, v.volume + d));
  document.getElementById("volR").value = v.volume;
}
function setVol(val) { document.getElementById("mainVid").volume = parseFloat(val); }

document.addEventListener("keydown", e => { if (e.key === "Escape") closePlayer(); });

/* Toast de bienvenida */
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 4500);
}
setTimeout(() => showToast("¡Bienvenido a los videos de ConCiencia! 💜"), 800);
</script>
